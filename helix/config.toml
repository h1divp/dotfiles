theme = "catppuccin_mocha"

[editor]
line-number = "relative"
mouse = false
color-modes = true
true-color = true

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false

[editor.lsp]
auto-signature-help = false
display-messages = true
# display-inlay-hints = true

[editor.statusline]
left = ["mode", "file-type",  "file-encoding" , "version-control"] 
center = ["spinner","file-name", "file-modification-indicator"]
right = [
    "selections",
    "primary-selection-length",
    "position",
    "total-line-numbers",
    "spacer",
    "diagnostics",
    "workspace-diagnostics",
]
separator = "|"

[keys.normal]
# move/copy line below/above
"A-j" = [ "extend_to_line_bounds", "delete_selection", "paste_after" ]
"A-k" = [ "extend_to_line_bounds", "delete_selection", "move_line_up", "paste_before" ]
"A-J" = [ "extend_to_line_bounds", "yank", "paste_after" ]
"A-K" = [ "extend_to_line_bounds", "yank", "paste_before" ]

H = "goto_previous_buffer"
L = "goto_next_buffer"
"." = "repeat_last_motion"

# snippets
" ".t = ":insert-output cat ~/.config/helix/snippets/codeforces.cpp"
"C-a" = "@%<space>y<ret>jk"

