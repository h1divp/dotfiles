[opener]
edit = [
{ run = 'helix "$@"', block = true }
]
browser = [
   { run = 'librewolf "$@"', desc = "librewolf"}
]
pinta = [
   { run = 'pinta "$@"', desc = "pinta"}
]
nomacs = [
   { run = 'nomacs "$@"', desc = "nomacs"}
]
gimp = [
   { run = 'gimp "$@"', desc = "gimp"}
]
video = [
   { run = 'mpv "$@"', desc = "video"}
]

[open]
prepend_rules = [
   { url = "*.pdf", use="browser" },
   { url = "*.png", use = ["browser", "pinta", "nomacs"] },
   { url = "*.jpg", use = ["browser", "pinta", "nomacs"] },
   { mime = "image/TIFF", use = ["browser", "pinta", "nomacs"] },
   { mime = "image/*", use = ["browser", "pinta", "gimp", "nomacs"] },
   { mime = "video/*", use = "video" },
   { mime = "audio/*", use = "video" },
]


[mgr]
linemode = "size"

[plugin]
prepend_previewers = [
  { mime = "{image,audio,video}/*", run = "mediainfo"},
  { mime = "application/subrip", run = "mediainfo"},
]
