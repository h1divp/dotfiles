[[mgr.prepend_keymap]]
on   = [ "g", "s" ]
run  = "cd ~/Media/Screenshots"
desc = "Cd to screenshots"

[[mgr.prepend_keymap]]
on   = [ "g", "r" ]
run  = "cd ~/Repos"
desc = "Cd to repos"

[[mgr.prepend_keymap]]
on   = [ "c", "s" ]
desc = "SSHFS: Connect to a remote server"
run  = "plugin sshfs"

[[mgr.prepend_keymap]]
on   = [ "c", "u" ]
desc = "SSHFS: Unmount a remote server"
run  = "plugin sshfs --args=unmount"
